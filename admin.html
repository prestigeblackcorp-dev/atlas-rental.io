<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://atlas.prestigeblackcorp.workers.dev; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<title>Atlas HQ &mdash; Master Dashboard</title>
<link rel="icon" href="favicon-32.png">
<style>
  /* ===== Atlas HQ master console. Pure-ASCII source. Dark control-room, emerald accent, gold for money. ===== */
  :root{
    --bg:#0a0f0d; --bg2:#0c1411; --surf:#111a16; --surf2:#152019; --surf3:#1a2720;
    --line:#213029; --line2:#2b3d34;
    --ink:#e9f2ec; --mut:#8ba095; --mut2:#67796f;
    --em:#31d68a; --em2:#23a86c; --emdim:#153a2a;
    --gold:#efc978; --gold2:#f4d99a;
    --red:#ff6f6f; --amber:#f4b454; --blue:#6cb8ff;
    --r:16px; --r2:12px; --r3:9px;
    --sh:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 30px rgba(0,0,0,.42);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:radial-gradient(1200px 700px at 78% -8%,#123122 0%,rgba(18,49,34,0) 60%),linear-gradient(180deg,#0a0f0d,#080c0a);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh;font-size:14px;line-height:1.5}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
  button{font-family:inherit;cursor:pointer}
  a{color:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#20302a;border-radius:20px;border:2px solid transparent;background-clip:content-box}

  /* ---- login gate ---- */
  #gate{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(900px 600px at 50% 0%,#10281c,#080c0a)}
  .gate-card{width:100%;max-width:400px;background:linear-gradient(180deg,var(--surf2),var(--surf));border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:30px 26px;text-align:center}
  .gate-badge{width:52px;height:52px;border-radius:14px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--em2),#0f6b45);box-shadow:0 6px 20px rgba(35,168,108,.35)}
  .gate-card h1{margin:0 0 4px;font-size:20px;letter-spacing:.2px}
  .gate-card p{margin:0 0 20px;color:var(--mut);font-size:13px}
  .fld{position:relative;text-align:left;margin-bottom:14px}
  .fld label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut2);margin:0 0 6px 2px;font-weight:600}
  .inp{width:100%;background:#0c1310;border:1px solid var(--line2);border-radius:var(--r3);color:var(--ink);padding:12px 13px;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s}
  .inp:focus{border-color:var(--em2);box-shadow:0 0 0 3px rgba(35,168,108,.16)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;border-radius:var(--r3);padding:11px 16px;font-size:14px;font-weight:600;color:#04160e;background:linear-gradient(180deg,var(--em),var(--em2));transition:filter .15s,transform .05s;width:100%}
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:translateY(1px)}
  .btn.sm{width:auto;padding:8px 12px;font-size:12.5px}
  .btn.ghost{background:transparent;border-color:var(--line2);color:var(--ink)}
  .btn.ghost:hover{background:var(--surf3)}
  .btn.gold{background:linear-gradient(180deg,var(--gold2),var(--gold));color:#241a06}
  .btn.danger{background:transparent;border-color:#4a2626;color:var(--red)}
  .btn.danger:hover{background:#1e1010}
  .gate-err{color:var(--red);font-size:12.5px;min-height:16px;margin-top:2px;text-align:left}
  .gate-foot{margin-top:16px;font-size:11.5px;color:var(--mut2)}

  /* ---- app shell ---- */
  #app{display:none;max-width:1320px;margin:0 auto;padding:0 20px 60px}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:14px 2px;margin-bottom:6px;background:linear-gradient(180deg,rgba(8,12,10,.94),rgba(8,12,10,.72) 70%,rgba(8,12,10,0));backdrop-filter:blur(10px)}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .mk{width:34px;height:34px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--em2),#0f6b45);box-shadow:0 4px 14px rgba(35,168,108,.3)}
  .brand b{font-size:15px;letter-spacing:.3px;display:block;line-height:1.1}
  .brand span{font-size:11px;color:var(--mut);letter-spacing:.4px}
  .top-spacer{flex:1}
  .live{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums}
  .live .dot{width:8px;height:8px;border-radius:50%;background:var(--em);box-shadow:0 0 0 0 rgba(49,214,138,.6);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(49,214,138,.5)}70%{box-shadow:0 0 0 7px rgba(49,214,138,0)}100%{box-shadow:0 0 0 0 rgba(49,214,138,0)}}
  .icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line2);background:var(--surf);color:var(--mut);display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s}
  .icon-btn:hover{color:var(--ink);background:var(--surf3)}
  .icon-btn.spin svg{animation:spin .7s linear}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---- KPI grid ---- */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin:8px 0 16px}
  .kpi{background:linear-gradient(180deg,var(--surf2),var(--surf));border:1px solid var(--line);border-radius:var(--r2);padding:14px 15px;box-shadow:var(--sh);position:relative;overflow:hidden;min-width:0}
  .kpi.hero{grid-column:span 2}
  .kpi .k-l{display:flex;align-items:center;gap:7px;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--mut);font-weight:600}
  .kpi .k-v{font-size:26px;font-weight:700;letter-spacing:-.4px;margin-top:8px;line-height:1}
  .kpi.hero .k-v{font-size:34px}
  .kpi .k-v.money{color:var(--gold2)}
  .kpi .k-s{font-size:11.5px;color:var(--mut2);margin-top:6px}
  .kpi .k-s b{color:var(--em)}
  .kpi .glow{position:absolute;right:-30px;top:-30px;width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,rgba(49,214,138,.14),transparent 70%);pointer-events:none}
  .kpi.gold .glow{background:radial-gradient(circle,rgba(239,201,120,.16),transparent 70%)}

  /* ---- cards / grid ---- */
  .grid{display:grid;grid-template-columns:1.55fr 1fr;gap:14px;align-items:start}
  .card{background:linear-gradient(180deg,var(--surf2),var(--surf));border:1px solid var(--line);border-radius:var(--r2);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden}
  .card-h{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .card-h h2{font-size:14px;margin:0;letter-spacing:.2px}
  .card-h .sub{font-size:11.5px;color:var(--mut2)}
  .card-h .sp{flex:1}
  .card-b{padding:6px 6px 8px}
  .card-b.pad{padding:16px}

  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px;border:1px solid transparent;white-space:nowrap}
  .pill.trial{color:var(--gold2);background:rgba(239,201,120,.1);border-color:rgba(239,201,120,.22)}
  .pill.active{color:var(--em);background:rgba(49,214,138,.1);border-color:rgba(49,214,138,.24)}
  .pill.past{color:var(--red);background:rgba(255,111,111,.1);border-color:rgba(255,111,111,.22)}
  .pill.gray{color:var(--mut);background:var(--surf3);border-color:var(--line2)}
  .pill.card{color:var(--blue);background:rgba(108,184,255,.09);border-color:rgba(108,184,255,.2)}
  .tier-tag{font-size:11px;font-weight:600;color:var(--mut);text-transform:capitalize}

  /* ---- table ---- */
  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut2);font-weight:600;padding:9px 12px;position:sticky;top:0;background:var(--surf);border-bottom:1px solid var(--line)}
  .tbl td{padding:11px 12px;border-bottom:1px solid rgba(33,48,41,.6);vertical-align:middle}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tr.row:hover td{background:rgba(26,39,32,.5)}
  .tbl .em{color:var(--ink);font-weight:600}
  .tbl .mut{color:var(--mut)}
  .tbl .money{color:var(--gold2);font-weight:600}
  .m-name{display:flex;flex-direction:column;gap:1px;min-width:0}
  .m-name b{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px}
  .m-name span{font-size:11.5px;color:var(--mut2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px}

  .toolbar{display:flex;align-items:center;gap:8px;padding:10px 12px;flex-wrap:wrap}
  .search{flex:1;min-width:150px;position:relative}
  .search input{width:100%;background:#0c1310;border:1px solid var(--line2);border-radius:8px;color:var(--ink);padding:8px 11px 8px 32px;font-size:13px;outline:none}
  .search input:focus{border-color:var(--em2)}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--mut2)}
  .seg{display:inline-flex;background:#0c1310;border:1px solid var(--line2);border-radius:8px;padding:2px;gap:2px}
  .seg button{border:0;background:transparent;color:var(--mut);font-size:12px;font-weight:600;padding:6px 11px;border-radius:6px;transition:.12s}
  .seg button.on{background:var(--surf3);color:var(--ink)}

  /* ---- feed / bugs ---- */
  .feed{display:flex;flex-direction:column}
  .feed-row{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid rgba(33,48,41,.6)}
  .feed-row:last-child{border-bottom:none}
  .feed-ic{width:32px;height:32px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--surf3);color:var(--em)}
  .feed-ic.gold{color:var(--gold2)}
  .feed-ic.blue{color:var(--blue)}
  .feed-tx{flex:1;min-width:0}
  .feed-tx b{font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .feed-tx span{font-size:11.5px;color:var(--mut2)}
  .feed-amt{font-size:13.5px;font-weight:700;color:var(--gold2);white-space:nowrap}

  .bug{padding:12px 14px;border-bottom:1px solid rgba(33,48,41,.6)}
  .bug:last-child{border-bottom:none}
  .bug-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .bug-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:2px 7px;border-radius:5px}
  .bug-type.bug{color:var(--red);background:rgba(255,111,111,.1)}
  .bug-type.idea{color:var(--gold2);background:rgba(239,201,120,.1)}
  .bug-msg{font-size:13px;color:var(--ink);line-height:1.45}
  .bug-meta{font-size:11px;color:var(--mut2);margin-top:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .bug-acts{display:flex;gap:6px;margin-top:8px}
  .tk-unread{box-shadow:inset 3px 0 0 var(--gold,#C79A3A)}
  .tk-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold,#C79A3A);margin-right:7px;vertical-align:middle}
  .tk-thread-a{max-height:44vh;overflow-y:auto;display:flex;flex-direction:column;gap:9px;margin:10px 0 2px;padding-right:2px}
  .tkm{max-width:88%;padding:8px 11px;border-radius:11px;font-size:13px;line-height:1.45}
  .tkm-who{font-size:10.5px;opacity:.65;margin-bottom:3px;font-weight:600}
  .tkm-own{align-self:flex-end;background:var(--gold,#C79A3A);color:#151922}
  .tkm-cust{align-self:flex-start;background:var(--card2,rgba(128,140,160,.14));color:var(--ink,#e7ebf2)}
  .chip{font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;border:1px solid var(--line2);background:transparent;color:var(--mut)}
  .chip:hover{color:var(--ink);background:var(--surf3)}
  .chip.on{color:var(--em);border-color:rgba(49,214,138,.3);background:rgba(49,214,138,.08)}

  .empty{padding:34px 20px;text-align:center;color:var(--mut2);font-size:13px}
  .empty svg{opacity:.5;margin-bottom:8px}

  .split{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .split>div{padding:14px 16px}
  .split>div+div{border-left:1px solid var(--line)}
  .stat-l{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut2);font-weight:600}
  .stat-v{font-size:22px;font-weight:700;margin-top:6px}
  .bar{height:7px;border-radius:5px;background:var(--surf3);overflow:hidden;margin-top:10px;display:flex}
  .bar i{display:block;height:100%}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:11.5px;color:var(--mut)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:9px;height:9px;border-radius:3px;display:inline-block}

  /* ---- modal ---- */
  #scrim{position:fixed;inset:0;z-index:60;background:rgba(4,8,6,.72);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:20px}
  #scrim.on{display:flex}
  .modal{width:100%;max-width:440px;background:linear-gradient(180deg,var(--surf2),var(--surf));border:1px solid var(--line2);border-radius:var(--r);box-shadow:0 24px 70px rgba(0,0,0,.6);overflow:hidden}
  .modal-h{display:flex;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}
  .modal-h h3{margin:0;font-size:15px}
  .modal-b{padding:18px}
  .modal-b .desc{color:var(--mut);font-size:12.5px;margin:-4px 0 14px}
  .opt-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
  .opt[data-a="gold"].on{border-color:var(--gold);color:var(--gold2);background:rgba(239,201,120,.12)}
  .opt{border:1px solid var(--line2);background:#0c1310;border-radius:9px;padding:10px 8px;text-align:center;font-size:12px;font-weight:600;color:var(--mut);transition:.12s}
  .opt.on{border-color:var(--em2);color:var(--ink);background:var(--emdim)}
  .modal-f{display:flex;gap:9px;padding:14px 18px;border-top:1px solid var(--line);background:rgba(12,19,16,.5)}
  .modal-f .btn{flex:1}
  select.inp{appearance:none;-webkit-appearance:none}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);z-index:80;background:#0c1712;border:1px solid var(--line2);color:var(--ink);padding:11px 16px;border-radius:11px;font-size:13px;display:flex;align-items:center;gap:9px;opacity:0;transition:.25s;box-shadow:0 12px 40px rgba(0,0,0,.5);pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast svg{color:var(--em)}

  @media(max-width:1080px){.kpis{grid-template-columns:repeat(3,1fr)}.kpi.hero{grid-column:span 3}.grid{grid-template-columns:1fr}}
  @media(max-width:620px){.kpis{grid-template-columns:repeat(2,1fr)}.kpi.hero{grid-column:span 2}.brand span{display:none}.tbl .hide-sm{display:none}}
</style>
</head>
<body>

<!-- ================= LOGIN GATE ================= -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-badge">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 2 4 5.5v6c0 5 3.4 8.4 8 10 4.6-1.6 8-5 8-10v-6L12 2Z" stroke="#eafff4" stroke-width="1.6" stroke-linejoin="round"/><path d="M9 12l2 2 4-4" stroke="#eafff4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>Atlas HQ</h1>
    <p>Master dashboard &middot; owner access only</p>
    <div class="fld">
      <label for="tok">Admin key</label>
      <input id="tok" class="inp" type="password" autocomplete="off" placeholder="Enter your admin key" onkeydown="if(event.key==='Enter')unlock()">
    </div>
    <div class="gate-err" id="gateErr"></div>
    <button class="btn" onclick="unlock()">Unlock console</button>
    <div class="gate-foot">This key is set as a worker secret (ADMIN_TOKEN). It never leaves your device except to verify.</div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="mk"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 3 3 20h4l5-10 5 10h4L12 3Z" fill="#eafff4"/></svg></div>
      <div><b>ATLAS HQ</b><span>Master Dashboard</span></div>
    </div>
    <div class="top-spacer"></div>
    <div class="live"><span class="dot"></span><span id="liveTxt">live</span></div>
    <button class="icon-btn" id="refreshBtn" title="Refresh now" onclick="refreshNow()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button class="icon-btn" title="Lock console" onclick="lock()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="4" y="10.5" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5" stroke="currentColor" stroke-width="1.8"/></svg></button>
  </header>

  <!-- KPI ROW -->
  <div class="kpis" id="kpis"></div>

  <!-- AI COMMAND CENTER -->
  <style>.ai-tools{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}.ai-brief{background:rgba(128,140,160,.06);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.55}.ai-brief-h{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px}.ai-md{font-size:13px;line-height:1.6}@media(max-width:720px){.grid{grid-template-columns:1fr!important}}</style>
  <div class="card">
    <div class="card-h"><h2>AI Command Center</h2><span class="sub" id="aiStatus"></span><div class="sp"></div><button class="chip" id="aiToggleBtn" onclick="aiToggle()">&hellip;</button></div>
    <div class="card-b" id="aiBody"><div class="mut" style="padding:10px 12px">Loading&hellip;</div></div>
  </div>

  <!-- REVENUE BREAKDOWN + FUNNEL -->
  <div class="card">
    <div class="card-h"><h2>Revenue &amp; growth</h2><span class="sub" id="revSub"></span><div class="sp"></div><span class="sub" id="revNote"></span></div>
    <div class="split" id="revSplit"></div>
  </div>

  <!-- MAIN GRID -->
  <div class="grid">
    <!-- LEFT: members -->
    <div>
      <div class="card">
        <div class="card-h"><h2>Members</h2><span class="sub" id="memCount"></span><div class="sp"></div><button class="chip" onclick="openDeleted()">Deleted</button></div>
        <div class="toolbar">
          <div class="search">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <input id="memSearch" placeholder="Search email or business..." oninput="renderMembers()">
          </div>
          <div class="seg" id="memSeg">
            <button class="on" data-f="all" onclick="setSeg(this)">All</button>
            <button data-f="trial" onclick="setSeg(this)">Trials</button>
            <button data-f="active" onclick="setSeg(this)">Paid</button>
            <button data-f="nocard" onclick="setSeg(this)">No card</button>
          </div>
        </div>
        <div style="overflow-x:auto"><table class="tbl" id="memTbl"></table></div>
      </div>
    </div>

    <!-- RIGHT: trials, bugs, transactions -->
    <div>
      <div class="card">
        <div class="card-h"><h2>Bug &amp; idea inbox</h2><div class="sp"></div>
          <div class="seg" id="bugSeg">
            <button class="on" data-s="open" onclick="setBugSeg(this)">Open</button>
            <button data-s="all" onclick="setBugSeg(this)">All</button>
          </div>
        </div>
        <div id="bugList"></div>
      </div>

      <div class="card">
        <div class="card-h"><h2>Support tickets</h2><div class="sp"></div>
          <div class="seg" id="tkSeg">
            <button class="on" data-s="open" onclick="setTkSeg(this)">Open</button>
            <button data-s="all" onclick="setTkSeg(this)">All</button>
          </div>
        </div>
        <div id="supportList"></div>
      </div>

      <div class="card">
        <div class="card-h"><h2>Live transactions</h2><span class="sub">to the cent</span></div>
        <div class="feed" id="txnFeed"></div>
      </div>
    </div>
  </div>
</div>

<!-- GRANT MODAL -->
<div id="scrim"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ================= config ================= */
var ATLAS_API = (/(^|\.)atlasrental\.io$/.test(location.hostname)) ? '' : 'https://atlas.prestigeblackcorp.workers.dev';
var TOK_KEY = 'atlas_admin_token';
var REFRESH_MS = 15000;
var TIERS = ['starter','pro','enterprise','business','unlimited'];
var TIER_LABEL = {starter:'Starter',pro:'Pro',enterprise:'Enterprise',business:'Business',unlimited:'Unlimited'};

/* ================= state ================= */
var _tok = '';
var DATA = { overview:null, members:[], txns:[], bugs:[], tickets:[], aiCfg:null };
var _seg = 'all', _bugSeg = 'open', _tkSeg = 'open', _timer = null, _lastFetch = 0, _prevKpi = {};

/* ================= helpers ================= */
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function centsUSD(c){ c=Number(c)||0; return '$'+(c/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function centsUSD0(c){ c=Number(c)||0; return '$'+Math.round(c/100).toLocaleString('en-US'); }
function nfmt(n){ return (Number(n)||0).toLocaleString('en-US'); }
function ago(ts){ if(!ts) return ''; var s=Math.floor((Date.now()-ts)/1000); if(s<60)return s+'s ago'; var m=Math.floor(s/60); if(m<60)return m+'m ago'; var h=Math.floor(m/60); if(h<24)return h+'h ago'; var d=Math.floor(h/24); return d+'d ago'; }
function dstr(ts){ if(!ts) return '--'; try{ return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }catch(e){ return '--'; } }
function daysLeft(ts){ if(!ts) return null; return Math.ceil((ts-Date.now())/86400000); }
function toast(msg){ var t=$('toast'); t.innerHTML='<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13 4.5 6.5 11 3 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'+esc(msg); t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove('on'); },2600); }

function api(path, opts){ opts=opts||{}; var h={'Content-Type':'application/json','X-Admin-Token':_tok}; var _a=_actorGet(); if(_a) h['X-Admin-Actor']=_a;
  return fetch(ATLAS_API+path,{method:opts.method||'GET',headers:h,body:opts.body?JSON.stringify(opts.body):undefined})
    .then(function(r){ return r.json().catch(function(){return {};}).then(function(j){ return {status:r.status,json:j}; }); }); }

/* ================= auth gate ================= */
function unlock(){ var v=($('tok').value||'').trim(); if(!v){ $('gateErr').textContent='Enter your admin key.'; return; }
  _tok=v; $('gateErr').textContent='Checking...';
  api('/api/admin/overview').then(function(res){
    if(res.status===200 && res.json && res.json.ok){ try{ localStorage.setItem(TOK_KEY,v); }catch(e){} enter(res.json); }
    else if(res.status===403 || res.status===401){ _tok=''; $('gateErr').textContent='That key was not accepted.'; }
    else { _tok=''; $('gateErr').textContent=(res.json&&res.json.error)||'Could not reach the server.'; }
  }).catch(function(){ _tok=''; $('gateErr').textContent='Network error reaching the server.'; }); }

function lock(){ _tok=''; try{ localStorage.removeItem(TOK_KEY); }catch(e){} if(_timer){ clearInterval(_timer); _timer=null; } $('app').style.display='none'; $('gate').style.display='flex'; $('tok').value=''; $('gateErr').textContent=''; }

function enter(overview){ $('gate').style.display='none'; $('app').style.display='block';
  if(overview){ DATA.overview=overview; paintOverview(); }
  loadAll();
  if(_timer) clearInterval(_timer);
  _timer=setInterval(function(){ loadAll(true); }, REFRESH_MS);
  setInterval(tickLive, 1000);
}

/* ================= data ================= */
function loadAll(quiet){ _lastFetch=Date.now();
  if(!quiet) $('refreshBtn').classList.add('spin');
  return Promise.all([
    api('/api/admin/overview'),
    api('/api/admin/members'),
    api('/api/admin/transactions?limit=40'),
    api('/api/admin/feedback?status='+(_bugSeg==='all'?'all':'open')),
    api('/api/admin/tickets?status='+(_tkSeg==='all'?'all':'open')),
    api('/api/admin/config')
  ]).then(function(r){
    if(r[0].json&&r[0].json.ok){ DATA.overview=r[0].json; paintOverview(); }
    if(r[1].json&&r[1].json.ok){ DATA.members=r[1].json.members||[]; renderMembers(); }
    if(r[2].json&&r[2].json.ok){ DATA.txns=r[2].json.transactions||[]; renderTxns(); }
    if(r[3].json&&r[3].json.ok){ DATA.bugs=r[3].json.feedback||[]; renderBugs(); }
    if(r[4]&&r[4].json&&r[4].json.ok){ DATA.tickets=r[4].json.tickets||[]; renderTickets(); }
    if(r[5]&&r[5].json&&r[5].json.config){ DATA.aiCfg=r[5].json.config; } else { DATA.aiCfg={ai_hq_enabled:false,ai_available:false,needsDeploy:true}; } renderAI();
    setTimeout(function(){ $('refreshBtn').classList.remove('spin'); },700);
    if((r[0].json&&r[0].json.ok)===false || r[0].status===403){ lock(); }
  }).catch(function(){ setTimeout(function(){ $('refreshBtn').classList.remove('spin'); },700); });
}
function refreshNow(){ loadAll(); toast('Refreshed'); }
function tickLive(){ $('liveTxt').textContent = _lastFetch ? ('updated '+ago(_lastFetch)) : 'live'; }

/* ================= KPI + revenue ================= */
function animateNum(el, to, fmt){ var from=_prevKpi[el.id]||0; _prevKpi[el.id]=to; if(from===to){ el.textContent=fmt(to); return; }
  var start=null, dur=520;
  function step(t){ if(!start)start=t; var p=Math.min((t-start)/dur,1); var e=1-Math.pow(1-p,3); el.textContent=fmt(Math.round(from+(to-from)*e)); if(p<1)requestAnimationFrame(step); }
  requestAnimationFrame(step); }

function paintOverview(){ var o=DATA.overview||{}; var rev=o.revenue||{}, mem=o.members||{}, ins=o.installs||{}, bugs=o.bugs||{};
  var kpis=[
    {id:'k_rev', hero:true, gold:true, label:'Total revenue', val:rev.total_cents||0, fmt:centsUSD, sub:'<b>'+centsUSD(rev.month_cents||0)+'</b> this month'},
    {id:'k_mrr', gold:true, label:'MRR', val:rev.mrr_cents||0, fmt:centsUSD, sub:'recurring / month'},
    {id:'k_mem', label:'Members', val:mem.total||0, fmt:function(v){return nfmt(v);}, sub:'<b>'+nfmt(mem.paid||0)+'</b> paying'},
    {id:'k_trial', label:'Trials', val:mem.trials||0, fmt:function(v){return nfmt(v);}, sub:nfmt(mem.trials_with_card||0)+' with card'},
    {id:'k_inst', label:'App installs', val:ins.total||0, fmt:function(v){return nfmt(v);}, sub:'PWA to home screen'},
    {id:'k_bug', label:'Open bugs', val:bugs.open||0, fmt:function(v){return nfmt(v);}, sub:nfmt(bugs.total||0)+' total'}
  ];
  $('kpis').innerHTML = kpis.map(function(k){ return '<div class="kpi'+(k.hero?' hero':'')+(k.gold?' gold':'')+'"><div class="glow"></div>'+
    '<div class="k-l">'+esc(k.label)+'</div><div class="k-v'+(k.gold?' money':'')+' num" id="'+k.id+'">'+(k.fmt(0))+'</div>'+
    '<div class="k-s num">'+k.sub+'</div></div>'; }).join('');
  kpis.forEach(function(k){ var el=$(k.id); if(el) animateNum(el, k.val, k.fmt); });

  // revenue split
  var byk = rev.by_kind||{}; var sub=byk.subscription||0, cr=byk.credits||0, ws=byk.website||0;
  var byt = mem.by_tier||{};
  $('revSub').textContent = o.ts ? '' : '';
  $('revNote').textContent = 'all-time, to the cent';
  var tierRows = TIERS.map(function(t){ var n=byt[t]||0; return n?('<span class="tier-tag" style="color:var(--ink)">'+TIER_LABEL[t]+': <b class="num">'+n+'</b></span>'):''; }).filter(Boolean).join(' &middot; ') || '<span class="mut">no paid members yet</span>';
  var tot=sub+cr+ws||1;
  $('revSplit').innerHTML =
    '<div><div class="stat-l">Subscriptions</div><div class="stat-v money num" style="color:var(--gold2)">'+centsUSD(sub)+'</div>'+
      '<div class="bar"><i style="width:'+(sub/tot*100)+'%;background:var(--gold)"></i><i style="width:'+(cr/tot*100)+'%;background:var(--em)"></i><i style="width:'+(ws/tot*100)+'%;background:var(--blue)"></i></div>'+
      '<div class="legend"><span><i style="background:var(--gold)"></i>Subs '+centsUSD0(sub)+'</span><span><i style="background:var(--em)"></i>Credits '+centsUSD0(cr)+'</span><span><i style="background:var(--blue)"></i>Websites '+centsUSD0(ws)+'</span></div></div>'+
    '<div><div class="stat-l">Members by tier</div><div style="margin-top:12px;line-height:2.1;font-size:13px">'+tierRows+'</div></div>';
}

/* ================= members ================= */
function setSeg(btn){ Array.prototype.forEach.call($('memSeg').children,function(b){b.classList.remove('on');}); btn.classList.add('on'); _seg=btn.getAttribute('data-f'); renderMembers(); }
function renderMembers(){ var q=($('memSearch').value||'').toLowerCase().trim();
  var rows=(DATA.members||[]).filter(function(m){
    if(_seg==='trial' && m.plan!=='trial') return false;
    if(_seg==='active' && m.plan!=='active') return false;
    if(_seg==='nocard' && (m.card_on_file || m.plan==='active')) return false;
    if(q){ var hay=((m.email||'')+' '+(m.name||'')).toLowerCase(); if(hay.indexOf(q)<0) return false; }
    return true;
  });
  $('memCount').textContent = nfmt(rows.length)+' shown';
  if(!rows.length){ $('memTbl').innerHTML='<tr><td><div class="empty"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="currentColor" stroke-width="1.6"/></svg><br>No members match.</div></td></tr>'; return; }
  var head='<thead><tr><th>Member</th><th>Plan</th><th class="hide-sm">Tier</th><th class="hide-sm">Joined</th><th style="text-align:right">Paid</th><th></th></tr></thead>';
  var body=rows.map(function(m){
    var plan = m.plan==='active' ? '<span class="pill active">Paid</span>'
             : m.plan==='past_due' ? '<span class="pill past">Past due</span>'
             : '<span class="pill trial">Trial</span>';
    var dl = daysLeft(m.trial_ends);
    var trialMeta = (m.plan==='trial' && dl!=null) ? ('<span class="pill '+(dl<0?'past':'gray')+'" style="margin-left:5px">'+(dl<0?'expired':dl+'d left')+'</span>') : '';
    var cardTag = (m.plan==='trial') ? (m.card_on_file?'<span class="pill card" style="margin-left:5px">card</span>':'') : '';
    var extra = [];
    if(m.customers!=null) extra.push(nfmt(m.customers)+' customers');
    if(m.bookings!=null) extra.push(nfmt(m.bookings)+' bookings');
    return '<tr class="row">'+
      '<td><div class="m-name"><b>'+esc(m.name||'(unnamed)')+'</b><span>'+esc(m.email||'')+(extra.length?(' &middot; '+extra.join(' &middot; ')):'')+'</span></div></td>'+
      '<td>'+plan+trialMeta+cardTag+'</td>'+
      '<td class="hide-sm"><span class="tier-tag">'+esc(TIER_LABEL[m.tier]||m.tier||'--')+'</span></td>'+
      '<td class="hide-sm mut num">'+dstr(m.created_at)+'</td>'+
      '<td style="text-align:right" class="money num">'+centsUSD(m.revenue_cents||0)+'</td>'+
      '<td style="text-align:right;white-space:nowrap">'+((DATA.aiCfg&&DATA.aiCfg.ai_hq_enabled)?('<button class="chip" onclick="aiHealth(&quot;'+esc(m.tenant_id)+'&quot;)">Health</button> '):'')+'<button class="chip" onclick="openGrant(&quot;'+esc(m.tenant_id)+'&quot;)">Grant</button> <button class="chip" style="color:#e5484d;margin-left:4px" onclick="delMember(&quot;'+esc(m.tenant_id)+'&quot;)">Delete</button></td>'+
    '</tr>';
  }).join('');
  $('memTbl').innerHTML=head+'<tbody>'+body+'</tbody>';
}

/* ================= transactions feed ================= */
function renderTxns(){ var t=DATA.txns||[];
  if(!t.length){ $('txnFeed').innerHTML='<div class="empty"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M3 12h4l2 6 4-14 2 8h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg><br>No transactions yet.<br><span style="font-size:11.5px">They appear the moment Stripe confirms a payment.</span></div>'; return; }
  $('txnFeed').innerHTML = t.slice(0,14).map(function(x){
    var k=x.kind||'', ic='gold', label;
    if(k==='subscription'||k==='plan'){ label='Subscription'+(x.tier?(' &middot; '+esc(TIER_LABEL[x.tier]||x.tier)):''); ic='gold'; }
    else if(k==='credits'){ label='Credits'+(x.pack?(' &middot; '+esc(x.pack)):''); ic='em'; }
    else if(k==='website'){ label='Website add-on'; ic='blue'; }
    else if(k==='trial'){ label='Trial started &middot; card on file'; ic='blue'; }
    else { label=esc(k||'Payment'); }
    var amt = (x.amount_cents>0) ? centsUSD(x.amount_cents) : (k==='trial'?'card':centsUSD(0));
    return '<div class="feed-row"><div class="feed-ic '+ic+'">'+txIcon(k)+'</div>'+
      '<div class="feed-tx"><b>'+label+'</b><span>'+esc(x.email||x.tenant_id||'')+' &middot; '+ago(x.created_at)+'</span></div>'+
      '<div class="feed-amt" style="'+(k==='trial'?'color:var(--blue)':'')+'">'+amt+'</div></div>';
  }).join('');
}
function txIcon(k){ if(k==='credits') return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.7"/><path d="M12 8v8M9.5 10h3.2a1.8 1.8 0 0 1 0 3.6H10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>';
  if(k==='website') return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M3 9h18" stroke="currentColor" stroke-width="1.7"/></svg>';
  if(k==='trial') return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M3 10h18" stroke="currentColor" stroke-width="1.7"/></svg>';
  return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3v18M17 7c0-2-2.5-3-5-3s-5 1-5 3.2c0 4.8 10 2.8 10 7.6C17 17 14.5 18 12 18s-5-1-5-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>'; }

/* ================= bugs ================= */
function setBugSeg(btn){ Array.prototype.forEach.call($('bugSeg').children,function(b){b.classList.remove('on');}); btn.classList.add('on'); _bugSeg=btn.getAttribute('data-s'); loadAll(true); }
function renderBugs(){ var b=DATA.bugs||[];
  if(!b.length){ $('bugList').innerHTML='<div class="empty"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 3l9 16H3L12 3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M12 10v4M12 16.5v.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><br>Nothing in the inbox.<br><span style="font-size:11.5px">User bug reports and ideas land here.</span></div>'; return; }
  $('bugList').innerHTML = b.map(function(f){
    var isbug = (f.type==='bug');
    var st = f.status||'new';
    return '<div class="bug"><div class="bug-top"><span class="bug-type '+(isbug?'bug':'idea')+'">'+(isbug?'Bug':'Idea')+'</span>'+
      (st!=='new'?'<span class="pill gray">'+esc(st)+'</span>':'')+'</div>'+
      '<div class="bug-msg">'+esc(f.message||'')+'</div>'+
      '<div class="bug-meta">'+esc(f.email||f.tenant_id||'')+(f.page?(' &middot; '+esc(f.page)):'')+' &middot; '+ago(f.created_at)+'</div>'+
      '<div class="bug-acts">'+
        '<button class="chip'+(st==='seen'?' on':'')+'" onclick="bugStatus('+JSON.stringify(f.id)+',\'seen\')">Seen</button>'+
        '<button class="chip'+(st==='resolved'?' on':'')+'" onclick="bugStatus('+JSON.stringify(f.id)+',\'resolved\')">Resolved</button>'+
      '</div></div>';
  }).join('');
}
function bugStatus(id, status){ api('/api/admin/feedback/update',{method:'POST',body:{id:id,status:status}}).then(function(r){ if(r.json&&r.json.ok){ toast('Marked '+status); loadAll(true); } else toast('Could not update'); }); }

/* ================= support tickets ================= */
function setTkSeg(btn){ Array.prototype.forEach.call($('tkSeg').children,function(b){b.classList.remove('on');}); btn.classList.add('on'); _tkSeg=btn.getAttribute('data-s'); loadAll(true); }
function _tkPill(s){ var m={open:['Open','trial'],answered:['Answered','active'],resolved:['Resolved','gray']}, x=m[s]||m.open; return '<span class="pill '+x[1]+'">'+x[0]+'</span>'; }
function renderTickets(){ var ts=DATA.tickets||[];
  if(!ts.length){ $('supportList').innerHTML='<div class="empty"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg><br>No support tickets.<br><span style="font-size:11.5px">Tenant tickets land here for you to reply.</span></div>'; return; }
  $('supportList').innerHTML = ts.map(function(t){
    var last=(t.messages&&t.messages.length)?t.messages[t.messages.length-1]:null;
    return '<div class="bug'+(t.unread?' tk-unread':'')+'" style="cursor:pointer" onclick="tkOpen('+JSON.stringify(t.id)+')"><div class="bug-top">'+(t.unread?'<span class="tk-dot"></span>':'')+'<b style="font-size:13.5px">'+esc(t.subject||'(no subject)')+'</b><div class="sp" style="flex:1"></div>'+_tkPill(t.status)+(t.priority==='high'?' <span class="pill past">Urgent</span>':'')+'</div>'+
      '<div class="bug-msg" style="font-size:12.5px">'+(last?esc((last.by==='owner'?'You: ':'')+String(last.msg).slice(0,110)):'')+'</div>'+
      '<div class="bug-meta">'+esc(t.email||t.tenant_id||'')+' &middot; '+esc(t.category||'')+' &middot; '+ago(t.updated_at)+'</div></div>';
  }).join('');
}
function tkOpen(id){ var t=(DATA.tickets||[]).filter(function(x){return x.id===id;})[0]; if(!t)return;
  var thread=(t.messages||[]).map(function(m){ var own=(m.by==='owner'); return '<div class="tkm '+(own?'tkm-own':'tkm-cust')+'"><div class="tkm-who">'+esc(own?'You (Atlas)':(m.name||t.email||'Customer'))+' &middot; '+dstr(m.at)+'</div><div>'+esc(m.msg).replace(/\n/g,'<br>')+'</div></div>'; }).join('');
  $('modal').innerHTML =
    '<div class="modal-h"><h3 style="min-width:0;overflow:hidden;text-overflow:ellipsis;max-width:66%">'+esc(t.subject)+'</h3><div class="sp" style="flex:1"></div>'+_tkPill(t.status)+'<button class="icon-btn" onclick="closeModal()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button></div>'+
    '<div class="modal-b"><div class="desc">'+esc(t.email||'')+' &middot; '+esc(t.category||'')+'</div>'+
      '<div class="tk-thread-a">'+thread+'</div>'+
      '<textarea id="tkReplyBox" rows="3" placeholder="Reply to the customer..." style="width:100%;margin-top:10px;padding:10px;border-radius:8px;border:1px solid rgba(128,140,160,.35);background:transparent;color:inherit;font-family:inherit;font-size:13px;box-sizing:border-box"></textarea><div id="tkAiMeta" class="mut" style="font-size:11.5px;margin-top:6px"></div></div>'+
    '<div class="modal-f">'+((DATA.aiCfg&&DATA.aiCfg.ai_hq_enabled)?('<button class="btn ghost" onclick="aiDraft('+JSON.stringify(id)+')">Draft with AI</button>'):'')+'<button class="btn ghost" onclick="tkStatus('+JSON.stringify(id)+',\'resolved\')">Mark resolved</button><button class="btn gold" onclick="tkReply('+JSON.stringify(id)+')">Send reply</button></div>';
  $('scrim').classList.add('on'); }
function tkReply(id){ var el=$('tkReplyBox'); var msg=el?(el.value||'').trim():''; if(msg.length<1){ toast('Write a reply'); return; }
  api('/api/admin/ticket-reply',{method:'POST',body:{id:id,message:msg}}).then(function(r){ if(r.json&&r.json.ok){ closeModal(); toast('Reply sent'); loadAll(true); } else toast('Could not send'); }); }
function tkStatus(id,status){ api('/api/admin/ticket-status',{method:'POST',body:{id:id,status:status}}).then(function(r){ if(r.json&&r.json.ok){ closeModal(); toast('Marked '+status); loadAll(true); } else toast('Could not update'); }); }

/* ================= delete account (frees the login email so it can re-register) ================= */
function delMember(tid){
  var L=DATA.members||[], m=null; for(var i=0;i<L.length;i++){ if(L[i].tenant_id===tid){ m=L[i]; break; } } if(!m) return;   // look up by safe id (no tenant text in the onclick)
  var who=(m.name||'this account')+(m.email?(' ('+m.email+')'):'');
  var _soft = !!(DATA.aiCfg && !DATA.aiCfg.needsDeploy);
  if(!confirm('Delete '+who+'?\n\n'+(_soft?'This removes it from your active members and frees the email to sign up again. It is RECOVERABLE from "Deleted" (all data + the audit log are kept) until you choose to Purge it.':'This removes the account and frees the email to re-register. Paste the latest worker first to make deletes recoverable.'))) return;
  api('/api/admin/delete',{method:'POST',body:{tenant_id:tid}}).then(function(res){
    if(res.status===200 && res.json && res.json.ok){ toast('Deleted (recoverable)'+(res.json.email?(' - '+res.json.email+' is free'):'')); loadAll(); }
    else { toast((res.json&&res.json.error)||'Could not delete that account'); }
  }).catch(function(){ toast('Network error deleting account'); });
}
/* ================= grant / comp ================= */
var _grant = {id:null, action:'tier', tier:'pro', credits:500, days:14};
function openGrant(tid){ var m=null, _L=DATA.members||[]; for(var _i=0;_i<_L.length;_i++){ if(_L[_i].tenant_id===tid){ m=_L[_i]; break; } } if(!m) return;   // look up by safe id -> no tenant-controlled text in the onclick attribute (was a stored-XSS sink)
  _grant={id:m.tenant_id, action:'gold', tier:m.tier||'pro', credits:500, days:14};
  $('modal').innerHTML =
    '<div class="modal-h"><h3>Grant &middot; '+esc(m.name||m.email||'member')+'</h3><div class="sp" style="flex:1"></div><button class="icon-btn" onclick="closeModal()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button></div>'+
    '<div class="modal-b"><div class="desc">Comp this member instantly &mdash; no charge to them.</div>'+
      '<div class="opt-row" id="gOpts">'+
        '<div class="opt on" data-a="gold" onclick="grantMode(this)">Give Gold</div>'+
        '<div class="opt" data-a="tier" onclick="grantMode(this)">Upgrade tier</div>'+
        '<div class="opt" data-a="credits" onclick="grantMode(this)">Add credits</div>'+
        '<div class="opt" data-a="trial" onclick="grantMode(this)">Extend trial</div>'+
      '</div><div id="gBody"></div></div>'+
    '<div class="modal-f"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn gold" onclick="doGrant()">Apply grant</button></div>';
  grantBody(); $('scrim').classList.add('on');
}
function grantMode(el){ Array.prototype.forEach.call($('gOpts').children,function(o){o.classList.remove('on');}); el.classList.add('on'); _grant.action=el.getAttribute('data-a'); grantBody(); }
function grantBody(){ var h='';
  if(_grant.action==='gold'){ h='<div class="desc" style="margin:0">Comps <b style="color:var(--gold2)">full Gold access</b> &mdash; every feature unlocked, billed $0. For a partner, friend, or VIP account.</div>'; }
  else if(_grant.action==='tier'){ h='<div class="fld"><label>Set tier to</label><select class="inp" onchange="_grant.tier=this.value">'+TIERS.map(function(t){return '<option value="'+t+'"'+(t===_grant.tier?' selected':'')+'>'+TIER_LABEL[t]+'</option>';}).join('')+'</select></div><div class="desc" style="margin:0">Marks them active on this tier at no cost.</div>'; }
  else if(_grant.action==='credits'){ h='<div class="fld"><label>Credits to add</label><input class="inp num" type="number" min="0" value="'+_grant.credits+'" oninput="_grant.credits=parseInt(this.value,10)||0"></div><div class="desc" style="margin:0">Added to their Atlas.io credit balance.</div>'; }
  else { h='<div class="fld"><label>Extend trial by (days)</label><input class="inp num" type="number" min="1" value="'+_grant.days+'" oninput="_grant.days=parseInt(this.value,10)||0"></div><div class="desc" style="margin:0">Pushes their trial end date out.</div>'; }
  $('gBody').innerHTML=h;
}
function doGrant(){ var body={tenant_id:_grant.id, action:_grant.action}; if(_grant.action==='tier')body.tier=_grant.tier; else if(_grant.action==='credits')body.credits=_grant.credits; else if(_grant.action==='trial')body.days=_grant.days;
  api('/api/admin/grant',{method:'POST',body:body}).then(function(r){ if(r.json&&r.json.ok){ closeModal(); toast('Grant applied'); loadAll(true); } else toast((r.json&&r.json.error)||'Could not apply grant'); }); }
function closeModal(){ $('scrim').classList.remove('on'); }
$('scrim').addEventListener('click', function(e){ if(e.target===$('scrim')) closeModal(); });

/* ================= AI Command Center ================= */
var _xI='<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
function _actorGet(){ try{ return localStorage.getItem('atlas_admin_actor')||''; }catch(e){ return ''; } }
function setActor(v){ try{ localStorage.setItem('atlas_admin_actor',(v||'').trim()); }catch(e){} }
function _mdLite(s){ return esc(s).replace(/\n{2,}/g,'<br><br>').replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/(Do this first:)/i,'<b style="color:var(--gold2)">$1</b>'); }
function renderAI(){ var c=DATA.aiCfg||{}, on=!!c.ai_hq_enabled, hasKey=!!c.ai_available; var st=$('aiStatus'), tg=$('aiToggleBtn'), bd=$('aiBody'); if(!st) return;
  if(c.needsDeploy){ st.innerHTML='<span class="pill gray">Not deployed</span>'; tg.style.display='none'; bd.innerHTML='<div class="mut" style="padding:10px 12px">Paste the latest worker into Cloudflare to enable the AI Command Center and the new safety features (recoverable delete, working audit trail, admin rate-limit).</div>'; return; } tg.style.display='';
  st.innerHTML = on ? (hasKey?'<span class="pill active">On</span>':'<span class="pill past">On &middot; no AI key</span>') : '<span class="pill gray">Off</span>';
  tg.textContent = on ? 'Turn off' : 'Turn on';
  if(!on){ bd.innerHTML='<div style="padding:10px 12px"><div class="desc" style="margin:0 0 10px">The AI tools are dark. Turn it on for your daily <b>morning brief</b>, <b>churn risk</b> scoring, <b>bug-inbox triage</b>, plain-English <b>questions about your data</b>, and <b>drafted support replies</b> &mdash; powered by your own AI keys, metered as your ops cost. Nothing sends or charges without you.</div>'+
      '<div class="fld" style="margin-bottom:8px"><label>Your name (optional &mdash; stamps the audit log)</label><input class="inp" id="aiActor" value="'+esc(_actorGet())+'" placeholder="e.g. Jalen" oninput="setActor(this.value)"></div>'+
      '<button class="btn gold sm" onclick="aiToggle()">Turn on the AI Command Center</button></div>'; return; }
  bd.innerHTML='<div style="padding:8px 12px 12px">'+(hasKey?'':'<div class="desc" style="color:var(--red);margin:0 0 8px">No AI key set in the worker &mdash; add ANTHROPIC_KEY / OPENAI_KEY / GEMINI_KEY in Cloudflare. Tools return an honest "no key" until then.</div>')+
    '<div class="ai-brief" id="aiBrief"><div class="mut">Loading your morning brief&hellip;</div></div>'+
    '<div class="ai-tools"><button class="btn ghost sm" onclick="aiAsk()">Ask your data</button><button class="btn ghost sm" onclick="aiCopilot()">Ops Copilot</button><button class="btn ghost sm" onclick="aiChurn()">Churn risk</button><button class="btn ghost sm" onclick="aiTriage()">Triage bugs</button><button class="btn ghost sm" onclick="aiNudges()">Onboarding nudges</button><button class="btn ghost sm" onclick="aiRelease()">Release notes</button></div></div>';
  loadBrief(false);
}
function aiToggle(){ var c=DATA.aiCfg||{}, next=!c.ai_hq_enabled; api('/api/admin/config',{method:'POST',body:{ai_hq_enabled:next}}).then(function(r){ if(r.json&&r.json.config){ DATA.aiCfg=r.json.config; renderAI(); toast('AI Command Center '+(next?'on':'off')); } else toast('Could not update'); }); }
function loadBrief(force){ var el=$('aiBrief'); if(!el) return; el.innerHTML='<div class="mut">Generating your brief&hellip; (a few seconds)</div>';
  api('/api/admin/brief'+(force?'?force=1':'')).then(function(r){ var j=r.json||{}; if(j.enabled===false){ el.innerHTML='<div class="mut">Turn the AI on to see your brief.</div>'; return; } if(j.ai===false){ el.innerHTML='<div class="mut">Add an AI key in the worker to generate the brief.</div>'; return; }
    el.innerHTML='<div class="ai-brief-h"><b>AI COO &middot; Morning brief</b><span class="mut" style="font-size:11px">&middot; '+esc(dstr(j.generated_at))+(j.cached?' (cached)':'')+'</span><button class="chip" style="margin-left:auto" onclick="loadBrief(true)">Regenerate</button></div><div class="ai-md">'+_mdLite((j.md||'').trim()||'(no brief text returned)')+'</div>'; }); }
function _aiOpen(title,inner){ $('modal').innerHTML='<div class="modal-h"><h3>'+esc(title)+'</h3><div class="sp" style="flex:1"></div><button class="icon-btn" onclick="closeModal()">'+_xI+'</button></div><div class="modal-b" style="max-height:62vh;overflow:auto">'+inner+'</div><div class="modal-f"><button class="btn ghost" onclick="closeModal()">Close</button></div>'; $('scrim').classList.add('on'); }
function _aiBusy(){ return '<div class="mut" style="padding:14px">Thinking&hellip;</div>'; }
function _aiHonest(j){ if(j.enabled===false) return '<div class="mut" style="padding:14px">The AI Command Center is off.</div>'; if(j.ai===false) return '<div class="mut" style="padding:14px">No AI provider key is set in the worker.</div>'; return null; }
function _cell(v){ if(v==null) return ''; if(typeof v==='number' && v>1e12) return dstr(v); return String(v).slice(0,60); }
function aiAsk(){ _aiOpen('Ask your data','<div class="fld"><label>Ask about your platform</label><input class="inp" id="aiQ" placeholder="trials expiring this week with a card" onkeydown="if(event.key===\'Enter\')aiAskRun()"></div><button class="btn gold sm" onclick="aiAskRun()">Ask</button><div id="aiQOut" style="margin-top:12px"></div>'); setTimeout(function(){ var e=$('aiQ'); if(e)e.focus(); },60); }
function aiAskRun(){ var q=($('aiQ').value||'').trim(); if(!q) return; var out=$('aiQOut'); out.innerHTML=_aiBusy();
  api('/api/admin/ai/nl-query',{method:'POST',body:{q:q}}).then(function(r){ var j=r.json||{}, h=_aiHonest(j); if(h){ out.innerHTML=h; return; } var rows=j.rows||[], tbl=''; if(rows.length){ var cols=Object.keys(rows[0]).slice(0,5); tbl='<div style="overflow:auto;margin-top:8px"><table class="tbl"><thead><tr>'+cols.map(function(c){return '<th>'+esc(c)+'</th>';}).join('')+'</tr></thead><tbody>'+rows.slice(0,50).map(function(x){return '<tr>'+cols.map(function(c){return '<td class="mut">'+esc(_cell(x[c]))+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table></div>'; }
    out.innerHTML='<div class="ai-md">'+esc(j.summary||'')+'</div>'+(j.intent&&j.intent!=='none'?('<div class="mut" style="font-size:11px;margin:6px 0">'+esc(j.intent)+' &middot; '+(j.count||0)+' rows</div>'):'')+tbl; }); }
function aiCopilot(){ _aiOpen('Ops Copilot','<div class="fld"><label>Ask the copilot</label><input class="inp" id="aiCQ" placeholder="which paying tenants have not booked in 30 days?" onkeydown="if(event.key===\'Enter\')aiCopilotRun()"></div><button class="btn gold sm" onclick="aiCopilotRun()">Ask</button><div id="aiCOut" style="margin-top:12px"></div>'); setTimeout(function(){ var e=$('aiCQ'); if(e)e.focus(); },60); }
function aiCopilotRun(){ var q=($('aiCQ').value||'').trim(); if(!q) return; var out=$('aiCOut'); out.innerHTML=_aiBusy(); api('/api/admin/ai/copilot',{method:'POST',body:{q:q}}).then(function(r){ var j=r.json||{}, h=_aiHonest(j); out.innerHTML=h||('<div class="ai-md">'+_mdLite(j.answer||'')+'</div>'); }); }
function aiChurn(){ _aiOpen('Churn risk','<div id="aiCh">'+_aiBusy()+'</div>'); api('/api/admin/ai/churn',{method:'POST',body:{}}).then(function(r){ var j=r.json||{}, h=_aiHonest(j), el=$('aiCh'); if(!el)return; if(h){el.innerHTML=h;return;} var c=j.churn||{}, ct=c.counts||{}; el.innerHTML='<div class="mut" style="font-size:12px;margin-bottom:8px">'+(ct.paid_zero_bookings||0)+' paid, 0 bookings/30d &middot; '+(ct.past_due||0)+' past-due &middot; '+(ct.trial_no_card_expiring||0)+' trial-no-card expiring</div><div class="ai-md">'+_mdLite(c.analysis||'')+'</div>'; }); }
function aiTriage(){ _aiOpen('Bug inbox triage','<div id="aiTr">'+_aiBusy()+'</div>'); api('/api/admin/ai/triage-bugs',{method:'POST',body:{}}).then(function(r){ var j=r.json||{}, h=_aiHonest(j), el=$('aiTr'); if(!el)return; if(h){el.innerHTML=h;return;} var t=j.triage||{}, cl=t.clusters||[]; if(!cl.length){ el.innerHTML='<div class="mut">'+esc(t.note||'Nothing to triage.')+'</div>'; return; } el.innerHTML=cl.map(function(x){ return '<div class="bug"><div class="bug-top"><span class="pill '+(/(P0|P1)/.test(x.severity||'')?'past':'gray')+'">'+esc(x.severity||'')+'</span> <b>'+esc(x.title||'')+'</b><div class="sp" style="flex:1"></div><span class="mut">'+(x.count||0)+'</span></div><div class="bug-msg">'+esc(x.action||'')+'</div></div>'; }).join(''); }); }
function aiNudges(){ _aiOpen('Onboarding nudges','<div id="aiNu">'+_aiBusy()+'</div>'); api('/api/admin/ai/onboarding-nudges',{method:'POST',body:{}}).then(function(r){ var j=r.json||{}, h=_aiHonest(j), el=$('aiNu'); if(!el)return; if(h){el.innerHTML=h;return;} var n=j.nudges||{}, it=n.items||[]; if(!it.length){ el.innerHTML='<div class="mut">'+esc(n.note||'No one is stuck.')+'</div>'; return; } el.innerHTML=it.map(function(x){ return '<div class="bug"><div class="bug-top"><b>'+esc(x.email||x.tenant_id||'')+'</b><div class="sp" style="flex:1"></div><span class="pill trial">'+esc(x.next_step||'')+'</span></div><div class="bug-msg">'+esc(x.nudge||'')+'</div></div>'; }).join(''); }); }
function aiRelease(){ _aiOpen('Release notes','<div id="aiRe">'+_aiBusy()+'</div>'); api('/api/admin/ai/release-notes',{method:'POST',body:{}}).then(function(r){ var j=r.json||{}, h=_aiHonest(j), el=$('aiRe'); if(!el)return; if(h){el.innerHTML=h;return;} if(!j.changelog && !j.internal){ el.innerHTML='<div class="mut">'+esc(j.note||'No shipped items yet (resolve some feedback first).')+'</div>'; return; } el.innerHTML='<div class="desc" style="margin:0 0 4px"><b>Customer changelog</b></div><div class="ai-md">'+_mdLite(j.changelog||'')+'</div><div class="desc" style="margin:12px 0 4px"><b>Internal ship-log</b></div><div class="ai-md">'+_mdLite(j.internal||'')+'</div>'; }); }
function aiHealth(tid){ _aiOpen('Tenant health','<div id="aiHe">'+_aiBusy()+'</div>'); api('/api/admin/ai/tenant-health',{method:'POST',body:{tenant_id:tid}}).then(function(r){ var j=r.json||{}, h=_aiHonest(j), el=$('aiHe'); if(!el)return; if(h){el.innerHTML=h;return;} var hh=j.health||{}, f=hh.facts||{}; el.innerHTML='<div class="ai-md">'+_mdLite(hh.summary||'')+'</div><div class="mut" style="font-size:11.5px;margin-top:10px">'+(f.bookings_total||0)+' bookings &middot; '+(f.assets||0)+' assets &middot; '+centsUSD(f.revenue_cents||0)+' &middot; '+(f.open_tickets||0)+' open tickets</div>'; }); }
function aiDraft(id){ var box=$('tkReplyBox'); if(box){ box.value='Drafting a reply...'; box.disabled=true; } api('/api/admin/ai/ticket-draft',{method:'POST',body:{id:id}}).then(function(r){ var j=r.json||{}; if(box) box.disabled=false; if(j.enabled===false||j.ai===false){ if(box)box.value=''; toast(j.reason||'AI is off'); return; } if(box) box.value=j.draft||''; var meta=$('tkAiMeta'); if(meta){ meta.innerHTML=(j.summary?('<b>Summary:</b> '+esc(j.summary)+' '):'')+(j.suggested_priority?('<span class="pill '+(j.suggested_priority==='high'?'past':'gray')+'">'+esc(j.suggested_priority)+'</span> '):'')+(j.confidence?('<span class="mut">confidence '+Math.round(j.confidence*100)+'%</span> '):'')+'<span class="mut">&mdash; review before sending</span>'; } }); }
/* ================= deleted accounts (soft-delete recovery) ================= */
function openDeleted(){ _aiOpen('Deleted accounts','<div id="delList">'+_aiBusy()+'</div>'); loadDeleted(); }
function loadDeleted(){ api('/api/admin/deleted').then(function(r){ var el=$('delList'); if(!el)return; var d=(r.json&&r.json.deleted)||[]; if(!d.length){ el.innerHTML='<div class="mut" style="padding:10px">No deleted accounts. Deletes are recoverable and land here.</div>'; return; } el.innerHTML='<div class="desc" style="margin:0 0 8px">Deleted accounts keep all data + the audit log. <b>Restore</b> brings one back; <b>Purge</b> (two-step) removes its operating data for good but keeps the revenue + audit ledger.</div>'+d.map(function(x){ return '<div class="bug"><div class="bug-top"><b>'+esc(x.name||'(unnamed)')+'</b><div class="sp" style="flex:1"></div><span class="mut">'+dstr(x.deleted_at)+'</span></div><div class="bug-meta">'+esc(x.email||'')+' &middot; '+esc(TIER_LABEL[x.tier]||x.tier||'')+'</div><div class="bug-acts"><button class="chip" onclick="restoreAcct('+JSON.stringify(x.tenant_id)+')">Restore</button> <button class="chip" style="color:#e5484d" onclick="purgeAcct('+JSON.stringify(x.tenant_id)+','+JSON.stringify(x.email||'')+')">Purge</button></div></div>'; }).join(''); }); }
function restoreAcct(tid){ api('/api/admin/restore',{method:'POST',body:{tenant_id:tid}}).then(function(r){ if(r.json&&r.json.ok){ var bl=r.json.blocked_emails||[]; toast(bl.length?('Restored, but email '+bl[0]+' was re-taken'):'Account restored'); loadDeleted(); loadAll(true); } else toast('Could not restore'); }); }
function purgeAcct(tid,email){ if(!confirm('Permanently purge '+(email||'this account')+'?\n\nThis removes its operating data for good. The revenue ledger and audit log are KEPT. This cannot be undone.')) return; api('/api/admin/purge',{method:'POST',body:{tenant_id:tid}}).then(function(r){ if(r.json&&r.json.ok){ toast('Purged'); loadDeleted(); loadAll(true); } else toast((r.json&&r.json.error)||'Could not purge'); }); }

/* ================= boot ================= */
(function(){ var saved=''; try{ saved=localStorage.getItem(TOK_KEY)||''; }catch(e){}
  if(saved){ _tok=saved; api('/api/admin/overview').then(function(res){ if(res.status===200&&res.json&&res.json.ok){ enter(res.json); } else { _tok=''; $('gate').style.display='flex'; } }).catch(function(){ _tok=''; }); }
})();
</script>
</body>
</html>
