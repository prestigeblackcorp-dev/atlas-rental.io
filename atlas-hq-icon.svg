<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="hqtile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1613"/>
      <stop offset="1" stop-color="#07120d"/>
    </linearGradient>
    <linearGradient id="hqgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7E7AE"/>
      <stop offset="0.5" stop-color="#E7C877"/>
      <stop offset="1" stop-color="#C79A3E"/>
    </linearGradient>
    <linearGradient id="hqemerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A7E5C"/>
      <stop offset="1" stop-color="#12583C"/>
    </linearGradient>
    <linearGradient id="hqroad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#C79A3E"/>
      <stop offset="1" stop-color="#F7E7AE"/>
    </linearGradient>
  </defs>
  <!-- Atlas HQ app tile: dark control-room -->
  <rect width="512" height="512" rx="116" fill="url(#hqtile)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="114.5" fill="none" stroke="#3a5246" stroke-width="3"/>
  <!-- peak-A: right face GOLD (money/HQ), left face EMERALD, split by the centre ridge -->
  <path d="M256 108 L388 404 H302 L256 300 Z" fill="url(#hqgold)"/>
  <path d="M256 108 L124 404 H210 L256 300 Z" fill="url(#hqemerald)"/>
  <!-- road sweeping up through the A, gold, tapering to the peak with a dashed centre line -->
  <path d="M156 404 Q208 252 250 128 L276 128 Q234 256 216 404 Z" fill="url(#hqroad)"/>
  <g fill="#0d1613">
    <path d="M244 156 l13 0 -4 25 -11 0 Z"/>
    <path d="M233 210 l15 0 -5 29 -13 0 Z"/>
    <path d="M221 272 l17 0 -6 33 -15 0 Z"/>
    <path d="M208 342 l19 0 -7 39 -17 0 Z"/>
  </g>
  <!-- HQ summit mark: a small gold diamond crowning the peak (owner / command centre) -->
  <path d="M256 60 l26 30 -26 30 -26 -30 Z" fill="url(#hqgold)"/>
  <path d="M256 74 l14 16 -14 16 -14 -16 Z" fill="#0d1613"/>
</svg>
