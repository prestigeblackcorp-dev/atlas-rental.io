<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#B9C6C0"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#EEF2F0"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <!-- app tile -->
  <rect width="512" height="512" rx="116" fill="#0A0A0A"/>
  <!-- peak-A: right face (deep green) then left face (silver), split by the centre ridge -->
