  <path d="M256 96 L120 416 H212 L256 300 Z" fill="url(#face)"/>
  <!-- road sweeping up through the A, tapering to the peak, with a dashed centre line -->
  <path d="M150 416 Q206 250 250 120 L276 120 Q232 255 214 416 Z" fill="url(#road)"/>
  <g fill="#12583C">
    <path d="M243 150 l14 0 -4 26 -12 0 Z"/>
    <path d="M232 208 l16 0 -5 30 -14 0 Z"/>
    <path d="M219 274 l18 0 -6 34 -16 0 Z"/>
    <path d="M205 348 l20 0 -7 40 -18 0 Z"/>
